<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senior 2027 – FCAI CU Poster Generator</title>
<link href="styles/style.css" rel="stylesheet">
</head>
<body>
<div class="app">

  <!-- Left Panel -->
  <aside class="panel">
    <div class="panel-title">🎓 Poster Generator · FCAI CU</div>

    <!-- Template selector -->
    <div>
      <div class="section-label">Choose Template</div>
      <div class="template-grid">
        <div class="tmpl-card active" data-tmpl="t1" onclick="selectTemplate('t1')">
          <img id="thumb-t1" src="" alt="Dark Neon">
          <span class="check">✓</span>
          <div class="tmpl-name">Dark Neon</div>
        </div>
        <div class="tmpl-card" data-tmpl="t3" onclick="selectTemplate('t3')">
          <img id="thumb-t3" src="" alt="Pastel">
          <span class="check">✓</span>
          <div class="tmpl-name">Pastel</div>
        </div>
      </div>
    </div>

    <hr>

    <!-- Photo Upload -->
    <div class="field-group">
      <label>Portrait Photo</label>
      <div class="upload-zone" onclick="document.getElementById('photoInput').click()">
        <input type="file" id="photoInput" accept="image/*">
        <div id="uploadContent">
          <span class="upload-icon">📷</span>
          <p>Click to upload<br><span style="color:#2a4060">JPG · PNG · WEBP</span></p>
        </div>
        <img id="photoThumb" class="photo-thumb" style="display:none" alt="Preview">
      </div>
    </div>

    <!-- Name -->
    <div class="field-group">
      <label>Full Name</label>
      <input type="text" id="nameInput" placeholder="e.g. Ahmed Mohamed Ali" maxlength="40">
    </div>

    <!-- Dept -->
    <div class="field-group">
      <label>Department</label>
      <select id="deptSelect">
        <option value="">— Select Department —</option>
        <option value="Computer Science">Computer Science</option>
        <option value="Artificial Intelligence">Artificial Intelligence</option>
        <option value="Information System">Information System</option>
        <option value="Information Technology">Information Technology</option>
        <option value="Decision Support">Decision Support</option>
      </select>
    </div>
    
    <button class="btn btn-primary" onclick="generatePoster()">✨ Generate Poster</button>
    <button class="btn btn-download" id="downloadBtn" disabled onclick="downloadPoster()">⬇ Download PNG</button>

    <div class="spacer"></div>
    <p class="footer-note">Senior 2027 · FCAI CU<br>Runs fully in your browser — nothing is uploaded.</p>
  </aside>

  <!-- Preview -->
  <main class="preview-area">
    <div class="poster-wrap">
      <canvas id="posterCanvas"></canvas>
      <span class="preview-hint">Live preview</span>
    </div>
  </main>

</div>

<script src="scripts/main.js">
</script>
</body>
</html>
